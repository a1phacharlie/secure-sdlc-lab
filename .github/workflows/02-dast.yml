name: "P1+P2 — DAST"

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── [P2] Least-privilege permissions ─────────────────────────────────────────
permissions:
  contents: read

jobs:

  dast:
    name: "DAST — OWASP ZAP baseline"
    runs-on: ubuntu-latest

    steps:
      # [P2] SHA-pinned actions
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0

      - name: Install safe app dependencies
        run: pip install -r app/requirements-safe.txt

      - name: Start Flask app
        run: |
          cd app
          python app.py &
          sleep 3
          curl --fail --silent http://localhost:5000/ > /dev/null \
            && echo "✓ App is up on :5000" \
            || (echo "✗ App failed to start" && exit 1)

      - name: Create reports directory
        run: mkdir -p reports

      # [P2] ZAP with continue-on-error (its internal artifact upload is broken
      # on the current Node.js 20 runtime — we upload reports ourselves below)
      - name: Run OWASP ZAP baseline scan (DAST)
        uses: zaproxy/action-baseline@66042c8e7e24680119199a017e5b0e8603bf4dae  # v0.12.0
        continue-on-error: true
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          fail_action: false
          allow_issue_writing: false

      - name: Upload DAST reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: dast-report
          path: |
            report_json.json
            report_md.md
            report_html.html
          retention-days: 30
