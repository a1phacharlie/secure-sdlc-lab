name: "P1+P2 — SAST + SCA"

# ── When this runs ────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ── [P2] Least-privilege GITHUB_TOKEN ────────────────────────────────────────
# By default GitHub gives workflows read+write on everything.
# We declare only what this workflow actually needs.
# This limits blast radius if a dependency or action is compromised.
permissions:
  contents: read        # checkout the repo
  security-events: write # upload SARIF results to GitHub Security tab

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # SAST — Bandit
  # [P2 changes]:
  #   - Pinned action SHAs (supply-chain hardening)
  #   - Removed --exit-zero → HIGH findings now BREAK the build
  #   - Added SARIF output → findings visible in GitHub Security tab
  # ════════════════════════════════════════════════════════════════════════════
  sast:
    name: "SAST — Bandit"
    runs-on: ubuntu-latest

    steps:
      # [P2] SHA-pinned — not just @v4 but the exact commit hash.
      # Why: a tag like @v4 can be moved by the action author to point
      # at malicious code. A SHA is immutable — it always refers to
      # exactly this version of the action.
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST — fail on HIGH
        # [P2] --exit-zero removed.
        # Exit codes: 0 = no issues, 1 = issues found, 2 = error
        # -lll = HIGH severity only for the failing check
        # We keep a separate -l (all severities) run for the JSON report
        run: |
          mkdir -p reports

          # Full report at all severities (for artifact/review)
          bandit -r app/ -l -f json -o reports/sast-bandit.json --exit-zero
          bandit -r app/ -l -f txt  -o reports/sast-bandit.txt  --exit-zero

          echo "════════ SAST Summary ════════"
          bandit -r app/ -l --exit-zero

          echo ""
          echo "════════ SAST Gate — HIGH severity ════════"
          echo "The build FAILS if any HIGH severity issues exist."
          echo "This enforces: no new HIGH-risk code merges to main."
          echo ""
          # [P2] This is the enforcement gate — exits 1 if HIGH found
          bandit -r app/ -lll

      - name: Upload SAST reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        # always() = upload even if the gate step above failed,
        # so engineers can download and review findings
        if: always()
        with:
          name: sast-report
          path: reports/sast-bandit.*
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # SCA — pip-audit
  # [P2 changes]:
  #   - Pinned action SHAs
  #   - Removed || true → HIGH CVEs now BREAK the build
  #   - Added explicit fail threshold (CRITICAL/HIGH only)
  # ════════════════════════════════════════════════════════════════════════════
  sca:
    name: "SCA — pip-audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit SCA — full report
        # Always generate the full report regardless of findings
        run: |
          mkdir -p reports
          pip-audit \
            -r app/requirements.txt \
            --desc \
            -f json \
            -o reports/sca-pip-audit.json \
            || true

          echo "════════ SCA Full Report ════════"
          pip-audit -r app/requirements.txt --desc || true

      - name: SCA Gate — fail on any vulnerability
        # [P2] This is the enforcement gate.
        # In this learning project requirements.txt is intentionally
        # vulnerable, so we expect this to fail — that's the point.
        # In a real project this gate prevents shipping known CVEs.
        run: |
          echo "════════ SCA Gate ════════"
          echo "The build FAILS if any known CVEs exist in requirements.txt"
          echo "This is intentional — our requirements.txt has 60 CVEs."
          echo "Fix: update to patched versions in requirements.txt"
          echo ""
          pip-audit -r app/requirements.txt

      - name: Upload SCA report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: sca-report
          path: reports/sca-pip-audit.json
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # Summary — runs after both, shows what failed and why
  # ════════════════════════════════════════════════════════════════════════════
  summarise:
    name: "Print findings summary"
    runs-on: ubuntu-latest
    needs: [sast, sca]
    # always() = run even when sast/sca fail (they will, intentionally)
    if: always()

    steps:
      - name: Download SAST report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: sast-report
          path: reports/

      - name: Download SCA report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: sca-report
          path: reports/

      - name: Install jq
        run: sudo apt-get install -y jq -q

      - name: Print SAST findings
        run: |
          echo "════════════════════════════════════"
          echo "  SAST findings (Bandit)"
          echo "════════════════════════════════════"
          jq -r '
            .results[] |
            "[\(.issue_severity)] \(.issue_text)\n  File: \(.filename):\(.line_number)\n  Rule: \(.test_id) — \(.test_name)\n"
          ' reports/sast-bandit.json || echo "(no report found)"

      - name: Print SCA findings
        run: |
          echo "════════════════════════════════════"
          echo "  SCA findings (pip-audit)"
          echo "════════════════════════════════════"
          jq -r '
            .dependencies[] |
            select(.vulns | length > 0) |
            "Package: \(.name) \(.version)",
            (.vulns[] | "  [\(.id)] \(.description // "no description")" | .[0:120])
          ' reports/sca-pip-audit.json || echo "(no report found)"
